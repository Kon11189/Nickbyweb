<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ИИ-партнер | Nikita by Web</title>
    <!-- Библиотеки ядра визуализации данных -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.2/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <style>
        :root {
            --bg: #03060a;
            --surface: #070d14;
            --border: #141f2c;
            --accent: #00bfff;
            --accent-glow: rgba(0, 191, 255, 0.25);
            --accent-hover: #0099cc;
            --text: #e2e8f0;
            --text-secondary: #6e849c;
            --font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: var(--bg);
            font-family: var(--font-family);
            /* Жесткий фикс для мобильных браузеров, чтобы строка не пряталась за панелями */
            height: 100vh; /* Фолбэк для старых браузеров */
            height: 100dvh; /* Динамическая высота для современных смартфонов */
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: var(--text);
        }

        /* --- Элитный экран загрузки --- */
        #splash {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.6s;
        }
        #splash.fade-out {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        .splash-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 320px;
        }
        .splash-title {
            font-size: 1.4rem;
            font-weight: 300;
            letter-spacing: 0.5em;
            color: #fff;
            text-transform: uppercase;
            margin-bottom: 2rem;
            text-shadow: 0 0 25px var(--accent-glow);
        }
        .loader-track {
            width: 100%;
            height: 2px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 4px;
            overflow: hidden;
        }
        .loader-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, transparent, var(--accent));
            box-shadow: 0 0 10px var(--accent), 0 0 5px var(--accent);
            transition: width 2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* --- Главное приложение --- */
        #chatApp {
            width: 100%;
            height: 100%;
            max-width: 950px;
            background: var(--surface);
            display: flex;
            flex-direction: column;
            opacity: 0;
            transform: scale(0.99);
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1), transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #chatApp.visible {
            opacity: 1;
            transform: scale(1);
        }
        @media (min-width: 768px) {
            #chatApp {
                height: 92vh;
                border-radius: 20px;
                box-shadow: 0 25px 60px rgba(0,0,0,0.6), 0 0 0 1px var(--border);
            }
        }

        /* --- Диалоговое окно --- */
        #messages {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            scroll-behavior: smooth;
        }
        .message {
            display: flex;
            flex-direction: column;
            padding: 2rem 2.5rem;
            animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        /* Фикс отступов для мобилок */
        @media (max-width: 768px) {
            .message {
                padding: 1.5rem 1.2rem;
            }
        }
        .message.bot {
            align-self: flex-start;
            width: 100%;
            border-bottom: 1px solid rgba(20, 31, 44, 0.5);
            color: #f1f5f9;
        }
        .message.user {
            align-self: flex-end;
            background: #091420;
            border: 1px solid #122438;
            border-radius: 16px 16px 4px 16px;
            padding: 1rem 1.4rem;
            margin: 1.5rem;
            max-width: 85%;
            box-shadow: 0 4px 25px rgba(0, 191, 255, 0.02);
        }

        /* --- Акценты разметки --- */
        .message-content {
            line-height: 1.65;
            font-size: 0.98rem;
            word-break: break-word;
            max-width: 850px;
            margin: 0 auto;
            width: 100%;
        }
        .message.bot .message-content strong {
            color: var(--accent);
            font-weight: 600;
            text-shadow: 0 0 15px rgba(0, 191, 255, 0.2);
        }
        .message.bot .message-content h2, 
        .message.bot .message-content h3 {
            color: #fff;
            font-weight: 500;
            margin-top: 1.6rem;
            margin-bottom: 0.8rem;
            border-left: 3px solid var(--accent);
            padding-left: 12px;
        }
        .message.bot .message-content ul {
            list-style: none;
            padding-left: 0;
            margin: 1rem 0;
        }
        .message.bot .message-content ul li {
            position: relative;
            padding-left: 1.5rem;
            margin-bottom: 0.6rem;
        }
        .message.bot .message-content ul li::before {
            content: "▪";
            position: absolute;
            left: 0;
            color: var(--accent);
            text-shadow: 0 0 8px var(--accent);
            font-size: 1rem;
            top: -1px;
        }
        .message-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 2rem 0;
            font-size: 0.92rem;
            background: #060a10;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            border: 1px solid var(--border);
        }
        .message-content th, .message-content td {
            padding: 1.1rem 1.4rem;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        .message-content th {
            background: #0c131c;
            font-weight: 500;
            color: var(--accent);
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 0.08em;
        }
        .message-content tr:last-child td {
            border-bottom: none;
            font-weight: 600;
            background: rgba(0, 191, 255, 0.04);
            color: #fff;
        }

        /* --- Панель ручного ввода --- */
        #inputPanel {
            display: flex;
            align-items: flex-end;
            padding: 1.2rem 1.5rem calc(1.2rem + env(safe-area-inset-bottom)); /* Учет системной полоски iOS/Android */
            background: var(--surface);
            border-top: 1px solid var(--border);
            gap: 1rem;
            flex-shrink: 0;
        }

        /* Анимация пульсации для неактивной строки */
        @keyframes neonPulse {
            0% { box-shadow: 0 0 4px rgba(0, 191, 255, 0.1), inset 0 0 2px rgba(0, 191, 255, 0.05); border-color: rgba(0, 191, 255, 0.3); }
            50% { box-shadow: 0 0 12px rgba(0, 191, 255, 0.4), inset 0 0 4px rgba(0, 191, 255, 0.1); border-color: rgba(0, 191, 255, 0.7); }
            100% { box-shadow: 0 0 4px rgba(0, 191, 255, 0.1), inset 0 0 2px rgba(0, 191, 255, 0.05); border-color: rgba(0, 191, 255, 0.3); }
        }

        #userInput {
            flex: 1;
            background: #0a0f16;
            color: #fff;
            font-size: 1rem; /* Оптимально для мобилок, чтобы не было зума */
            font-family: inherit;
            resize: none;
            outline: none;
            
            /* Закрытое состояние: капсула в одну строку с неон-дыханием */
            height: 48px;
            border-radius: 24px;
            padding: 0 1.4rem;
            line-height: 48px;
            white-space: nowrap;
            overflow: hidden;
            border: 1px solid rgba(0, 191, 255, 0.3);
            animation: neonPulse 2.5s infinite ease-in-out;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        /* Раскрытое состояние: при фокусе (человек печатает) */
        #userInput:focus,
        #userInput:not(:placeholder-shown) {
            height: 120px;
            border-radius: 16px;
            padding: 1rem 1.4rem;
            line-height: 1.5;
            white-space: normal;
            overflow-y: auto;
            border-color: var(--accent);
            box-shadow: 0 5px 20px rgba(0, 191, 255, 0.3);
            animation: none; /* Останавливаем пульсацию при вводе */
        }
        #userInput::placeholder {
            color: var(--text-secondary);
            opacity: 0.6;
        }

        #sendBtn {
            background: var(--accent);
            color: #000;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            flex-shrink: 0;
            box-shadow: 0 0 10px rgba(0,191,255,0.2);
        }
        #sendBtn:hover {
            background: var(--accent-hover);
            transform: scale(1.05);
            box-shadow: 0 0 18px rgba(0,191,255,0.4);
        }
        #sendBtn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        /* --- Эксклюзивный лид-виджет --- */
        #leadWidgetArea {
            display: none;
            padding: 2.5rem 1.5rem;
            background: linear-gradient(180deg, rgba(0,191,255,0.02) 0%, transparent 100%);
            border-top: 1px solid var(--border);
            animation: fadeIn 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            overflow-y: auto;
        }
        .widget-card {
            max-width: 650px;
            margin: 0 auto;
            background: #090e15;
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2rem 1.5rem;
            box-shadow: 0 20px 45px rgba(0,0,0,0.5);
        }
        .widget-notice {
            font-size: 0.8rem;
            color: var(--accent);
            margin-bottom: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 500;
        }
        .widget-card h3 {
            font-size: 1.2rem;
            margin-bottom: 1.5rem;
            font-weight: 400;
            color: #fff;
            line-height: 1.4;
        }
        
        .phone-group {
            display: flex;
            gap: 0.6rem;
            margin-bottom: 1.5rem;
        }
        .country-select {
            background: #101620;
            border: 1px solid var(--border);
            border-radius: 10px;
            color: #fff;
            padding: 0 0.8rem;
            font-size: 0.95rem;
            outline: none;
            cursor: pointer;
            transition: border-color 0.2s;
            max-width: 45%;
        }
        .country-select:focus {
            border-color: var(--accent);
        }
        .phone-input {
            flex: 1;
            background: #101620;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 0.9rem 1rem;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .phone-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 10px rgba(0, 191, 255, 0.1);
        }

        .widget-label {
            font-size: 0.92rem;
            color: var(--text-secondary);
            margin-bottom: 0.8rem;
        }

        .widget-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }
        .chip {
            background: #121a24;
            border: 1px solid transparent;
            color: var(--text);
            padding: 0.6rem 1rem;
            border-radius: 24px;
            font-size: 0.88rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .chip:hover {
            background: #1a2533;
            border-color: rgba(0, 191, 255, 0.2);
        }
        .chip.selected {
            background: rgba(0, 191, 255, 0.12);
            border-color: var(--accent);
            color: var(--accent);
            font-weight: 500;
            box-shadow: 0 0 10px rgba(0, 191, 255, 0.1);
        }
        
        #submitLeadBtn {
            width: 100%;
            background: var(--accent);
            color: #000;
            border: none;
            padding: 1rem;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 0.5rem;
        }
        #submitLeadBtn:hover {
            background: var(--accent-hover);
            box-shadow: 0 0 20px rgba(0, 191, 255, 0.25);
        }
        .success-message {
            text-align: center;
            color: #00ffaa;
            padding: 1.5rem 0;
            animation: fadeIn 0.4s ease;
        }

        .typing-indicator {
            display: inline-flex;
            gap: 5px;
            padding: 0.5rem 0;
        }
        .typing-indicator span {
            width: 6px;
            height: 6px;
            background: var(--text-secondary);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); background: var(--accent); }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

                let triggerForm = false;
                if (role === 'bot' && text.includes('[ПОКАЗАТЬ_ФОРМУ_КОНТАКТОВ]')) {
                    text = text.replace('[ПОКАЗАТЬ_ФОРМУ_КОНТАКТОВ]', '').trim();
                    triggerForm = true;
                }

                const msg = document.createElement('div');
                msg.className = `message ${role}`;
                const content = document.createElement('div');
                content.className = 'message-content';
                
                if (role === 'bot') {
                    content.innerHTML = DOMPurify.sanitize(marked.parse(text, { breaks: true }));
                } else {
                    content.innerHTML = DOMPurify.sanitize(text);
                }
                
                msg.appendChild(content);
                messagesContainer.appendChild(msg);
                
                // Исправленная прокрутка
                setTimeout(() => {
                    messagesContainer.scrollTop = messagesContainer.scrollHeight;
                }, 50);

                if (triggerForm) {
                    leadWidgetArea.style.display = 'block';
                    inputPanel.style.display = 'none';
                    setTimeout(() => {
                        messagesContainer.scrollTop = messagesContainer.scrollHeight;
                    }, 50);
                }
            }

            function showTyping() {
                const el = document.createElement('div');
                el.className = 'message bot';
                el.id = 'typingIndicator';
                el.innerHTML = '<div class="message-content"><div class="typing-indicator"><span></span><span></span><span></span></div></div>';
                messagesContainer.appendChild(el);
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            }
            
            function hideTyping() {
                const el = document.getElementById('typingIndicator');
                if (el) el.remove();
            }

            // --- Сетевой слой с автоматическим резервированием на Gemini ---
            async function handleSend() {
                const text = userInput.value.trim();
                if (!text) return;

                addMessage('user', text);
                userInput.value = '';

                // Сброс высоты textarea после отправки
                userInput.blur(); 

                const userMsg = { role: "user", content: text };
                messageHistory.push(userMsg);

                showTyping();

                try {
                    // Основной запрос на gpt-5-nano:exacto
                    const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                        method: "POST",
                        headers: {
                            "Authorization": `Bearer ${OPENROUTER_API_KEY}`,
                            "HTTP-Referer": window.location.href,
                            "X-Title": "Nikita by Web",
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({
                            model: "openai/gpt-5-nano:exacto",
                            messages: messageHistory,
                            temperature: 0.5,
                            max_tokens: 1600
                        })
                    });

                    const data = await res.json();
                    
                    if (res.ok && data.choices?.length) {
                        hideTyping();
                        const reply = data.choices[0].message.content;
                        messageHistory.push({ role: "assistant", content: reply });
                        addMessage('bot', reply);
                        return; 
                    }
                    
                    throw new Error("Основная модель недоступна");

                } catch (primaryError) {
                    console.warn("Включаю резервную модель Gemini...", primaryError);
                    
                    try {
                        // Резервный запрос на Google Gemini Pro
                        const backupRes = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                            method: "POST",
                            headers: {
                                "Authorization": `Bearer ${OPENROUTER_API_KEY}`,
                                "HTTP-Referer": window.location.href,
                                "X-Title": "Nikita by Web (Backup)",
                                "Content-Type": "application/json"
                            },
                            body: JSON.stringify({
                                model: "google/gemini-2.5-pro",
                                messages: messageHistory,
                                temperature: 0.5,
                                max_tokens: 1600
                            })
                        });

                        const backupData = await backupRes.json();
                        hideTyping();

                        if (backupRes.ok && backupData.choices?.length) {
                            const reply = backupData.choices[0].message.content;
                            messageHistory.push({ role: "assistant", content: reply });
                            addMessage('bot', reply);
                        } else {
                            addMessage('bot', 'Временный сбой серверов. Повторите запрос.');
                        }

                    } catch (backupError) {
                        hideTyping();
                        addMessage('bot', 'Потеря соединения. Проверьте сеть.');
                    }
                }
            }

            sendBtn.addEventListener('click', handleSend);
            userInput.addEventListener('keydown', e => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    handleSend();
                }
            });

            // Интерактивная логика виджета сбора лидов
            let selectedMessenger = "";
            let selectedTimeSlot = "";

            function setupChips(containerId, callback) {
                const container = document.getElementById(containerId);
                const chips = container.querySelectorAll('.chip');
                chips.forEach(chip => {
                    chip.addEventListener('click', function() {
                        chips.forEach(c => c.classList.remove('selected'));
                        this.classList.add('selected');
                        callback(this.innerText);
                    });
                });
            }

            setupChips('messengerChips', (val) => { selectedMessenger = val; });
            setupChips('timeChips', (val) => { selectedTimeSlot = val; });

            submitLeadBtn.addEventListener('click', () => {
                const rawPhone = phoneInput.value.trim();
                const prefix = countrySelect.value;
                
                if (!rawPhone) {
                    alert('Укажите ваш номер телефона для связи.');
                    return;
                }
                if (!selectedMessenger) {
                    alert('Выберите желаемый мессенджер/канал связи.');
                    return;
                }
                if (!selectedTimeSlot) {
                    alert('Выберите предпочтительное время для звонка.');
                    return;
                }

                const fullPhoneNumber = prefix + " " + rawPhone;

                widgetCardInner.innerHTML = `
                    <div class="success-message">
                        <svg width="46" height="46" viewBox="0 0 24 24" fill="none" stroke="#00ffaa" stroke-width="2" style="margin-bottom:12px;">
                            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                            <polyline points="22 4 12 14.01 9 11.01"></polyline>
                        </svg>
                        <p style="font-weight:500; font-size:1.1rem; color:#fff;">Спецификация передана инженерам</p>
                        <p style="font-size:0.9rem; color:var(--text-secondary); margin-top:8px; line-height:1.5;">
                            Архитектурная матрица зафиксирована.<br>Наш специалист свяжется с вами через <strong>${selectedMessenger}</strong> в интервале <strong>${selectedTimeSlot}</strong> по номеру <strong>${fullPhoneNumber}</strong>.
                        </p>
                    </div>
                `;
            });

        })();
    </script>
</body>
</html>
