        });
        const data = await res.json();
        hideTyping();
        if (res.ok && data.choices?.length) {
          const reply = data.choices[0].message.content;
          messageHistory.push({ role: "assistant", content: reply });
          addMessage('bot', reply);
        } else {
          throw new Error("API error");
        }
      } catch (e) {
        hideTyping();
        addMessage('bot', '⚠️ Кратковременный сбой связи. Повторите, пожалуйста, последний ответ.');
        inputPanel.style.display = 'flex';
        scrollDown();
      }
    }

    function addMessage(role, text) {
      let triggerForm = false;
      if (role === 'bot' && text.includes('[ПОКАЗАТЬ_ФОРМУ_КОНТАКТОВ]')) {
        text = text.replace(/\[ПОКАЗАТЬ_ФОРМУ_КОНТАКТОВ\]/g, '').trim();
        triggerForm = true;
      }
      if (!text && !triggerForm) return;

      const msg = document.createElement('div');
      msg.className = `message ${role}`;
      const content = document.createElement('div');
      content.className = 'message-content';

      let optionsHTML = '';
      if (role === 'bot') {
        const single = text.match(/\[ВЫБОР:\s*(.+?)\]/);
        const multi = text.match(/\[МУЛЬТИВЫБОР:\s*(.+?)\]/);
        const match = single || multi;
        if (match) {
          const isMulti = !!multi;
          const opts = match[1].split('|').map(o => o.trim());
          text = text.replace(/\[(ВЫБОР|МУЛЬТИВЫБОР):.*?\]/g, '').trim();
          if (isMulti) {
            optionsHTML = `<div class="options-wrapper"><div class="multi-header">Выберите подходящие: <span class="multi-counter">0</span></div><div class="options-container">${opts.map(o => `<button class="option-btn multi-btn" data-val="${o}">${o}</button>`).join('')}</div><button class="continue-btn">Подтвердить выбор</button></div>`;
          } else {
            optionsHTML = `<div class="options-wrapper"><div class="options-container">${opts.map(o => `<button class="option-btn" data-val="${o}">${o}</button>`).join('')}</div></div>`;
          }
        }
      }

      content.innerHTML = DOMPurify.sanitize(marked.parse(text)) + optionsHTML;
      msg.appendChild(content);
      messagesEl.appendChild(msg);
      scrollDown();

      if (optionsHTML) {
        inputPanel.style.display = 'none';
        const wrapper = msg.querySelector('.options-wrapper');
        const btns = wrapper.querySelectorAll('.option-btn');
        const isMulti = btns[0]?.classList.contains('multi-btn');

        if (isMulti) {
          const continueBtn = wrapper.querySelector('.continue-btn');
          const counter = wrapper.querySelector('.multi-counter');

          // Поиск кнопки "Ничего не нужно"
          let nothingBtn = null;
          btns.forEach(b => {
            if (b.dataset.val.toLowerCase().includes('ничего не нужно')) {
              nothingBtn = b;
            }
          });

          btns.forEach(b => {
            b.addEventListener('click', () => {
              const isNothing = b.dataset.val.toLowerCase().includes('ничего не нужно');

              if (isNothing) {
                // Логика переключения "Ничего не нужно"
                const wasSelected = b.classList.contains('selected');
                if (!wasSelected) {
                  // Активируем "Ничего не нужно", деактивируем остальные
                  btns.forEach(other => {
                    if (other !== b) {
                      other.classList.remove('selected');
                      other.classList.add('inactive');
                    }
                  });
                  b.classList.add('selected');
                } else {
                  // Снимаем выделение, возвращаем остальные
                  btns.forEach(other => {
                    if (other !== b) {
                      other.classList.remove('inactive');
                    }
                  });
                  b.classList.remove('selected');
                }
              } else {
                // Обычная кнопка
                b.classList.toggle('selected');
                // Если была нажата другая кнопка, а "Ничего не нужно" активно — снимаем её
                if (nothingBtn && nothingBtn.classList.contains('selected')) {
                  nothingBtn.classList.remove('selected');
                  btns.forEach(other => {
                    if (other !== nothingBtn) {
                      other.classList.remove('inactive');
                    }
                  });
                }
              }

              // Обновить счётчик и продолжить
              const selectedCount = wrapper.querySelectorAll('.selected').length;
              counter.textContent = selectedCount;
              continueBtn.style.display = selectedCount > 0 ? 'block' : 'none';

              const hasOther = Array.from(wrapper.querySelectorAll('.selected')).some(s => s.dataset.val.toLowerCase().includes('другое'));
              inputPanel.style.display = hasOther ? 'flex' : 'none';
            });
          });

          continueBtn.addEventListener('click', () => {
            const selected = Array.from(wrapper.querySelectorAll('.selected'))
              .map(b => b.dataset.val)
              .filter(v => !v.toLowerCase().includes('другое'));
            let answer = selected.join(', ');
            const otherText = userInput.value.trim();
            if (otherText) answer += (answer ? ', ' : '') + otherText;
            btns.forEach(b => b.disabled = true);
            continueBtn.style.display = 'none';
            userInput.value = '';
            handleUserMessage(answer || 'Другое');
          });
        } else {
          // Одиночный выбор
          btns.forEach(b => {
            b.addEventListener('click', () => {
              const val = b.dataset.val;
              btns.forEach(x => x.disabled = true);
              b.classList.add('selected');
              if (val.toLowerCase().includes('другое') || val.toLowerCase().includes('изменить')) {
                inputPanel.style.display = 'flex';
                userInput.focus();
              } else {
                handleUserMessage(val);
              }
            });
          });
        }
      } else if (role === 'bot' && !triggerForm) {
        inputPanel.style.display = 'flex';
      }

      if (triggerForm) {
        leadWidget.style.display = 'block';
        inputPanel.style.display = 'none';
        setTimeout(() => leadWidget.scrollIntoView({ behavior: 'smooth', block: 'center' }), 150);
      }
    }

    function showTyping() {
      const el = document.createElement('div');
      el.className = 'message bot';
      el.id = 'typingIndicator';
      el.innerHTML = '<div class="message-content"><div class="typing-indicator"><span></span><span></span><span></span></div></div>';
      messagesEl.appendChild(el);
      scrollDown();
    }
    function hideTyping() {
      const el = document.getElementById('typingIndicator');
      if (el) el.remove();
    }

    sendBtn.addEventListener('click', () => {
      const val = userInput.value.trim();
      if (!val) return;
      userInput.value = '';
      handleUserMessage(val);
    });
    userInput.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendBtn.click();
      }
    });

    telegramBtn.addEventListener('click', () => {
      let chatText = "📋 ТЗ и смета (Nikita by Web):\n\n";
      messageHistory.forEach(m => {
        if (m.role === 'system') return;
        let clean = m.content.replace(/\[ПОКАЗАТЬ_ФОРМУ_КОНТАКТОВ\]/g, '').replace(/\[(ВЫБОР|МУЛЬТИВЫБОР):[^\]]+\]/g, '').trim();
        if (clean) chatText += `${m.role === 'user' ? '👤 Клиент' : '🤖 Ассистент'}:\n${clean}\n\n`;
      });
      window.open(`https://t.me/${TELEGRAM_USER}?text=${encodeURIComponent(chatText)}`, '_blank');
    });
  })();
</script>
</body>
</html>
